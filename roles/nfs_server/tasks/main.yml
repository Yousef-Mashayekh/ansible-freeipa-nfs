---
# tasks file for roles/nfs_server

- name: Install packages 
  ansible.builtin.package:
    name: "{{ pkg.name }}"
    state: present
  loop: "{{ nfs_packages }}"
  loop_control:
    loop_var: pkg
    label: "{{ pkg.name }}"

- name: Set SELinux Boolean
  ansible.builtin.command:
    cmd: setsebool -P use_nfs_home_dirs on

- name: Start and enable NFS services
  ansible.builtin.service:
    name: "{{ svc.name }}"
    state: "{{ svc.state }}"
    enabled: "{{ svc.enabled }}"
  loop: "{{ nfs_services }}"
  loop_control:
    loop_var: svc
    label: "{{ svc.name }}"

- name: Configure /etc/exports
  ansible.builtin.template:
    src: exports.j2
    dest: /etc/exports
  notify: Export file

- name: Configure /etc/auto.master
  ansible.builtin.template:
    src: auto.master.j2
    dest: /etc/auto.master
  notify: Restart autofs service

- name: Open firewall services
  ansible.posix.firewalld:
    service: "{{ fw.name }}"
    permanent: true
    immediate: true
    state: enabled
  loop: "{{ firewall_services }}"
  loop_control:
    loop_var: fw
    label: "{{ fw.name }}"

- name: Fix idmapd.conf
  ansible.builtin.lineinfile:
    path: /etc/idmapd.conf
    regexp: '^[#]?Domain\s*='
    line: "Domain = {{ ipaserver_domain }}"
